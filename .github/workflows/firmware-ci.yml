name: Firmware CI

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PlatformIO
        uses: platformio/action@v1
        with:
          version: "^6"
      
      - name: Build Firmware
        run: |
          cd firmware
          pio run
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware/.pio/build/*/firmware.bin
